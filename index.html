<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundaVest Pro — ניתוח ערך מתקדם</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root{--s50:#0a0a0f;--s100:#12121a;--s200:#1a1a25;--s300:#222233;--s400:#2a2a3d;--gold:#d4a853;--grn:#22c55e;--red:#ef4444;--blue:#3b82f6;--cyan:#06b6d4;--txt:#e2e2e8;--txt2:#a0a0b0;--txt3:#6b6b7b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--s50);color:var(--txt);min-height:100vh}
  .score-ring{position:relative;width:220px;height:220px}
  .score-ring svg{transform:rotate(-90deg)}
  .score-ring circle{fill:none;stroke-width:8}
  .score-ring .bg-c{stroke:var(--s200)}
  .score-ring .fg-c{stroke-linecap:round;transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1),stroke .5s}
  .score-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-number{font-family:'Playfair Display',serif;font-size:4rem;font-weight:800;line-height:1}
  .spinner{width:48px;height:48px;border:3px solid var(--s200);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn-gold{background:linear-gradient(135deg,#d4a853,#b8903f);color:#0a0a0f}
  .card{background:var(--s100);border:1px solid var(--s200);border-radius:12px;padding:20px}
  .metric-label{font-size:.75rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .metric-value{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600}
  .buy-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-weight:700;font-size:.85rem}
  .buy-yes{background:rgba(34,197,94,.15);color:var(--grn)}
  .buy-no{background:rgba(239,68,68,.1);color:var(--red)}
  .chip-grn{display:inline-block;background:rgba(34,197,94,.12);color:#4ade80;font-size:.75rem;padding:2px 10px;border-radius:999px;border:1px solid rgba(34,197,94,0.2)}
  .chip-red{display:inline-block;background:rgba(239,68,68,.12);color:#f87171;font-size:.75rem;padding:2px 10px;border-radius:999px;border:1px solid rgba(239,68,68,0.2)}
  .no-print{ display: block; }
  @media print { .no-print { display: none !important; } }
</style>
</head>
<body>

<header class="sticky top-0 z-50 backdrop-blur-md bg-black/80 border-b border-gray-800 no-print">
  <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gold rounded-lg flex items-center justify-center font-bold text-black">FV</div>
      <h1 class="text-xl font-bold text-gold font-d">FundaVest Pro</h1>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <input id="apiKeyInput" type="password" placeholder="Anthropic API Key" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs w-40"/>
      <input id="avKeyInput" type="password" placeholder="Alpha Vantage Key" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs w-40"/>
      <button onclick="saveKeys()" class="bg-gold text-black px-3 py-1 rounded text-xs font-bold">שמור</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
  <section class="mb-6 no-print">
    <div class="flex flex-col sm:flex-row gap-3">
      <input id="tickerInput" type="text" placeholder="סימול מניה (MSFT, SABR, AAPL)" class="flex-1 bg-gray-900 border border-gray-700 p-4 rounded-xl text-xl font-m uppercase focus:border-gold outline-none" onkeydown="if(event.key==='Enter') analyzeStock()"/>
      <button onclick="analyzeStock()" class="btn-gold px-10 text-lg font-bold rounded-xl">נתח עכשיו</button>
    </div>
  </section>

  <div id="loading" class="hidden flex flex-col items-center py-20 gap-4">
      <div class="spinner"></div>
      <p id="loadingMsg" class="text-gold animate-pulse text-lg">שואב נתונים פונדמנטליים...</p>
  </div>

  <div id="resultsArea" class="hidden space-y-6">
    <div class="flex justify-between items-center">
        <div class="flex items-baseline gap-3">
            <h2 id="compName" class="text-3xl font-bold font-d">---</h2>
            <span id="compTicker" class="text-gold font-m text-xl">---</span>
        </div>
        <button onclick="exportToPDF()" class="no-print bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-all">
            📥 הורד דוח PDF
        </button>
    </div>

    <div id="pdf-content" class="space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="card flex flex-col items-center justify-center py-8" id="scoreCard">
                <div class="score-ring">
                    <svg viewBox="0 0 220 220">
                        <circle class="bg-c" cx="110" cy="110" r="96"/>
                        <circle id="scoreCircle" class="fg-c" cx="110" cy="110" r="96" stroke-dasharray="603.19" stroke-dashoffset="603.19"/>
                    </svg>
                    <div class="score-value">
                        <span id="scoreNum" class="score-number">0</span>
                        <span class="text-xs text-gray-500">ציון איכות</span>
                    </div>
                </div>
                <div id="buyTag" class="mt-4"></div>
            </div>

            <div class="card lg:col-span-2 grid grid-cols-2 md:grid-cols-4 gap-6 content-center">
                <div><p class="metric-label">מחיר</p><p id="valPrice" class="text-2xl font-bold font-m">--</p></div>
                <div><p class="metric-label">מכפיל P/E</p><p id="valPe" class="text-2xl font-bold font-m">--</p></div>
                <div><p class="metric-label">ROE</p><p id="valRoe" class="text-2xl font-bold font-m text-green-400">--</p></div>
                <div><p class="metric-label">דיבידנד</p><p id="valDiv" class="text-2xl font-bold font-m">--</p></div>
                <div class="pt-4 border-t border-gray-800"><p class="metric-label">PEG Ratio</p><p id="valPeg" class="font-m">--</p></div>
                <div class="pt-4 border-t border-gray-800"><p class="metric-label">שווי שוק</p><p id="valCap" class="font-m">--</p></div>
                <div class="pt-4 border-t border-gray-800"><p class="metric-label">מכפיל הון</p><p id="valPb" class="font-m">--</p></div>
                <div class="pt-4 border-t border-gray-800"><p class="metric-label">FCF/Income</p><p id="valFcf" class="font-m">--</p></div>
            </div>
        </div>

        <div class="card border-r-4 border-gold bg-gradient-to-l from-gold/5 to-transparent">
            <h3 class="text-gold font-bold mb-4 flex items-center gap-2 text-xl"><span>🔍</span> ניתוח אנליסט מעמיק</h3>
            <div id="aiSummary" class="text-gray-200 leading-relaxed text-lg mb-6 p-4 bg-black/40 rounded-xl italic"></div>
            
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-green-500/5 p-4 rounded-xl border border-green-500/10">
                    <h4 class="text-green-400 font-bold mb-3 flex items-center gap-2">✅ חוזקות המנייה</h4>
                    <ul id="aiPros" class="space-y-2"></ul>
                </div>
                <div class="bg-red-500/5 p-4 rounded-xl border border-red-500/10">
                    <h4 class="text-red-400 font-bold mb-3 flex items-center gap-2">⚠️ חולשות וסיכונים</h4>
                    <ul id="aiCons" class="space-y-2"></ul>
                </div>
            </div>
        </div>
    </div>
  </div>
</main>

<script>
// מפתח ברירת מחדל ל-AV
const AV_DEFAULT = "9A72O2F5PF9CSLER";

function saveKeys() {
    localStorage.setItem('fv_ant', document.getElementById('apiKeyInput').value.trim());
    localStorage.setItem('fv_av', document.getElementById('avKeyInput').value.trim() || AV_DEFAULT);
    alert("המפתחות נשמרו בדפדפן!");
}

window.onload = () => {
    document.getElementById('apiKeyInput').value = localStorage.getItem('fv_ant') || "";
    document.getElementById('avKeyInput').value = localStorage.getItem('fv_av') || AV_DEFAULT;
};

async function analyzeStock() {
    const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
    const antKey = localStorage.getItem('fv_ant');
    const avKey = localStorage.getItem('fv_av') || AV_DEFAULT;

    if (!ticker || !antKey) return alert("אנא הזן סימול ומפתח Anthropic");

    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('resultsArea').classList.add('hidden');

    try {
        // משיכת נתונים מ-Alpha Vantage
        const ovRes = await fetch(`https://www.alphavantage.co/query?function=OVERVIEW&symbol=${ticker}&apikey=${avKey}`);
        const ov = await ovRes.json();
        if (ov.Note) throw new Error("מגבלת API של Alpha Vantage (5 בדקה). המתן דקה.");
        if (!ov.Symbol) throw new Error("מניה לא נמצאה.");

        const qRes = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${avKey}`);
        const qData = await qRes.json();
        const quote = qData["Global Quote"] || {};

        const cfRes = await fetch(`https://www.alphavantage.co/query?function=CASH_FLOW&symbol=${ticker}&apikey=${avKey}`);
        const cfData = await cfRes.json();
        const cf = cfData.annualReports?.[0] || {};

        // חישוב יחס FCF/Income
        const fcfRatio = (cf.operatingCashflow && cf.netIncome) ? (parseFloat(cf.operatingCashflow) / parseFloat(cf.netIncome)).toFixed(2) : "N/A";

        // עדכון UI נתונים יבשים
        document.getElementById('compName').innerText = ov.Name;
        document.getElementById('compTicker').innerText = ov.Symbol;
        document.getElementById('valPrice').innerText = "$" + parseFloat(quote["05. price"] || 0).toFixed(2);
        document.getElementById('valPe').innerText = ov.PERatio || "N/A";
        document.getElementById('valRoe').innerText = (parseFloat(ov.ReturnOnEquityTTM || 0) * 100).toFixed(1) + "%";
        document.getElementById('valDiv').innerText = (parseFloat(ov.DividendYield || 0) * 100).toFixed(1) + "%";
        document.getElementById('valPeg').innerText = ov.PEGRatio || "N/A";
        document.getElementById('valPb').innerText = ov.PriceToBookRatio || "N/A";
        document.getElementById('valCap').innerText = "$" + (parseFloat(ov.MarketCapitalization)/1e9).toFixed(2) + "B";
        document.getElementById('valFcf').innerText = fcfRatio + "x";

        // ניתוח AI
        document.getElementById('loadingMsg').innerText = "קלוד (האנליסט) בודק את הדוחות הפיננסיים...";
        const ai = await callClaude(ov, quote, fcfRatio, antKey);
        
        renderAI(ai);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('resultsArea').classList.remove('hidden');

    } catch (e) {
        alert(e.message);
        document.getElementById('loading').classList.add('hidden');
    }
}

async function callClaude(ov, quote, fcf, key) {
    const prompt = `You are a professional equity analyst. Analyze ${ov.Symbol} (${ov.Name}).
    Fundamentals: P/E: ${ov.PERatio}, PEG: ${ov.PEGRatio}, ROE: ${ov.ReturnOnEquityTTM}, 
    Profit Margin: ${ov.ProfitMargin}, DebtToEquity: ${ov.DebtToEquityRatio}, 
    FCF/NetIncome Ratio: ${fcf}, PriceToBook: ${ov.PriceToBookRatio}.
    Scoring Rules: ROE > 15% is good. PEG < 1 is undervalued. FCF/NI > 0.8 is high earnings quality.
    Return ONLY JSON:
    {"score":0-100, "summary":"Hebrew analysis (4-5 sentences)", "pros":["Hebrew point"],"cons":["Hebrew point"],"buy":true/false}`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": key,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
            model: "claude-3-sonnet-20240229",
            max_tokens: 1000,
            messages: [{role: "user", content: prompt}]
        })
    });
    
    const json = await res.json();
    if (!json.content || !json.content[0]) throw new Error("שגיאה בתקשורת עם ה-AI");
    
    let text = json.content[0].text;
    return JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
}

function renderAI(ai) {
    document.getElementById('scoreNum').innerText = ai.score;
    const offset = 603.19 - (ai.score / 100) * 603.19;
    document.getElementById('scoreCircle').style.strokeDashoffset = offset;
    
    // צבע הציון
    const color = ai.score >= 80 ? "#22c55e" : ai.score >= 50 ? "#d4a853" : "#ef4444";
    document.getElementById('scoreCircle').style.stroke = color;
    document.getElementById('scoreNum').style.color = color;

    document.getElementById('aiSummary').innerText = ai.summary;
    document.getElementById('aiPros').innerHTML = ai.pros.map(p => `<li class="flex items-start gap-2 text-sm"><span>✅</span>${p}</li>`).join('');
    document.getElementById('aiCons').innerHTML = ai.cons.map(c => `<li class="flex items-start gap-2 text-sm"><span>⚠️</span>${c}</li>`).join('');
    
    document.getElementById('buyTag').innerHTML = ai.buy 
        ? '<div class="buy-badge buy-yes">✓ אישור קנייה - פונדמנטלי חזק</div>' 
        : '<div class="buy-badge buy-no">✗ לא עומד בקריטריונים כרגע</div>';
}

function exportToPDF() {
    const element = document.getElementById('resultsArea');
    const ticker = document.getElementById('compTicker').innerText;
    const opt = {
        margin: 10,
        filename: `FundaVest_Analysis_${ticker}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, backgroundColor: '#0a0a0f', useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
