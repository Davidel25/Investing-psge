<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundaVest — ניתוח השקעות פונדמנטלי</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --s50:#0a0a0f;--s100:#12121a;--s200:#1a1a25;--s300:#222233;--s400:#2a2a3d;
            --gold:#d4a853;--grn:#22c55e;--red:#ef4444;--blue:#3b82f6;--cyan:#06b6d4;
            --txt:#e2e2e8;--txt2:#a0a0b0;--txt3:#6b6b7b;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'IBM Plex Sans',sans-serif;background:var(--s50);color:var(--txt);min-height:100vh}
        .score-ring{position:relative;width:220px;height:220px}
        .score-ring svg{transform:rotate(-90deg)}
        .score-ring circle{fill:none;stroke-width:8}
        .score-ring .bg-c{stroke:var(--s200)}
        .score-ring .fg-c{stroke-linecap:round;transition:stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1),stroke 0.5s}
        .score-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .score-number{font-family:'Playfair Display',serif;font-size:4rem;font-weight:800;line-height:1}
        .spinner{width:48px;height:48px;border:3px solid var(--s200);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        input[type="text"],input[type="password"]{background:var(--s100);border:1px solid var(--s300);color:var(--txt);border-radius:8px;padding:10px 14px;outline:none}
        .btn{padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
        .btn-gold{background:linear-gradient(135deg,#d4a853,#b8903f);color:#0a0a0f}
        .card{background:var(--s100);border:1px solid var(--s200);border-radius:12px;padding:20px}
        .metric-label{font-size:.75rem;color:var(--txt3);text-transform:uppercase;margin-bottom:4px}
        .metric-value{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600}
        .buy-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-weight:700}
        .buy-yes{background:rgba(34,197,94,.15);color:var(--grn)}
    </style>
</head>
<body>

<header class="site-header border-b border-gray-800 p-4 sticky top-0 bg-black/80 backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gold p-2 rounded-lg text-black font-bold">FV</div>
            <h1 class="text-gold text-xl font-bold font-d">FundaVest Pro</h1>
        </div>
        <div class="flex gap-2">
            <input id="anthropicKey" type="password" placeholder="Anthropic API Key" class="text-xs w-40" />
            <input id="alphaVantageKey" type="password" placeholder="Alpha Vantage Key" class="text-xs w-40" />
            <button onclick="saveKeys()" class="btn btn-gold text-xs py-1">שמור מפתחות</button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
    <section class="mb-10 text-center">
        <div class="flex gap-2">
            <input id="tickerInput" type="text" placeholder="הכנס סימול (MSFT, SABR)" class="flex-1 text-xl font-m uppercase" onkeydown="if(event.key==='Enter') analyzeStock()"/>
            <button onclick="analyzeStock()" class="btn btn-gold px-10 font-bold">נתח מניה</button>
        </div>
    </section>

    <div id="loading" class="hidden flex flex-col items-center py-20">
        <div class="spinner mb-4"></div>
        <p id="loadingMsg" class="text-gold animate-pulse">טוען...</p>
    </div>

    <div id="results" class="hidden space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="card flex flex-col items-center justify-center text-center">
                <div class="score-ring">
                    <svg viewBox="0 0 220 220"><circle class="bg-c" cx="110" cy="110" r="96"/><circle id="scoreCircle" class="fg-c" cx="110" cy="110" r="96" stroke-dasharray="603.19" stroke-dashoffset="603.19"/></svg>
                    <div class="score-value"><span id="scoreNum" class="score-number">0</span></div>
                </div>
                <div id="buyStatus" class="mt-4"></div>
            </div>
            <div class="card lg:col-span-2">
                <div class="flex justify-between border-b border-gray-800 pb-4 mb-4">
                    <div><h2 id="compName" class="text-3xl font-bold font-d">---</h2><p id="compTicker" class="text-gold font-m">---</p></div>
                    <div class="text-right"><p id="compPrice" class="text-3xl font-bold font-m">---</p></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="metricsGrid">
                    </div>
            </div>
        </div>
        <div class="card border-gold/30">
            <h3 class="text-gold font-bold mb-4">🤖 ניתוח AI</h3>
            <div id="aiSummary" class="text-gray-200 mb-6"></div>
        </div>
    </div>
</main>

<script>
function saveKeys() {
    localStorage.setItem("fv_ant", document.getElementById("anthropicKey").value);
    localStorage.setItem("fv_av", document.getElementById("alphaVantageKey").value);
    alert("המפתחות נשמרו בדפדפן שלך בלבד!");
}

window.onload = () => {
    document.getElementById("anthropicKey").value = localStorage.getItem("fv_ant") || "";
    document.getElementById("alphaVantageKey").value = localStorage.getItem("fv_av") || "";
};

async function analyzeStock() {
    const ticker = document.getElementById("tickerInput").value.toUpperCase();
    const antKey = localStorage.getItem("fv_ant");
    const avKey = localStorage.getItem("fv_av");

    if (!ticker || !antKey || !avKey) return alert("חסר סימול או מפתחות API");

    document.getElementById("loading").classList.remove("hidden");
    document.getElementById("results").classList.add("hidden");

    try {
        const overviewRes = await fetch(`https://www.alphavantage.co/query?function=OVERVIEW&symbol=${ticker}&apikey=${avKey}`);
        const overview = await overviewRes.json();
        
        const quoteRes = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${avKey}`);
        const quote = await quoteRes.json();

        document.getElementById("compName").innerText = overview.Name;
        document.getElementById("compTicker").innerText = overview.Symbol;
        document.getElementById("compPrice").innerText = "$" + (quote["Global Quote"]?.["05. price"] || "0");

        const ai = await callClaude(overview, quote["Global Quote"], antKey);
        renderAI(ai);

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("results").classList.remove("hidden");
    } catch (e) {
        alert("שגיאה: " + e.message);
        document.getElementById("loading").classList.add("hidden");
    }
}

async function callClaude(overview, quote, key) {
    const prompt = `Analyze ${overview.Symbol}. P/E: ${overview.PERatio}, PEG: ${overview.PEGRatio}. Return JSON: {"score":0-100, "summary":"Hebrew analysis", "buy":true}`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": key,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
            model: "claude-3-sonnet-20240229",
            max_tokens: 1000,
            messages: [{role: "user", content: prompt}]
        })
    });
    const json = await res.json();
    return JSON.parse(json.content[0].text);
}

function renderAI(ai) {
    document.getElementById("scoreNum").innerText = ai.score;
    const offset = 603.19 - (ai.score / 100) * 603.19;
    document.getElementById("scoreCircle").style.strokeDashoffset = offset;
    document.getElementById("scoreCircle").style.stroke = ai.score >= 80 ? "#22c55e" : "#d4a853";
    document.getElementById("aiSummary").innerText = ai.summary;
    document.getElementById("buyStatus").innerHTML = ai.buy ? '<span class="buy-badge buy-yes">✓ אישור קנייה</span>' : '<span class="text-red-500">✗ המתן</span>';
}
</script>
</body>
</html>
