<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundaVest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4a853; --dark: #0a0a0f; }
        body { background-color: var(--dark); color: white; font-family: system-ui, -apple-system, sans-serif; }
        .card { background: #12121a; border: 1px solid #222233; border-radius: 12px; padding: 20px; }
        .btn-gold { background: linear-gradient(135deg, #d4a853, #b8903f); color: black; font-weight: bold; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
        .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <header class="max-w-5xl mx-auto flex flex-wrap justify-between items-center mb-8 gap-4 border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-bold text-gold">FundaVest Pro</h1>
        <div class="flex gap-2">
            <input id="antKey" type="password" placeholder="Anthropic Key" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs w-40">
            <input id="avKey" type="password" placeholder="Alpha Vantage Key" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs w-40">
            <button onclick="saveKeys()" class="btn-gold text-xs">שמור</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <div class="flex gap-2 mb-8">
            <input id="tickerInput" type="text" placeholder="הכנס סימול (MSFT)" class="flex-1 bg-gray-900 border border-gray-700 p-4 rounded text-xl uppercase">
            <button id="mainBtn" onclick="analyzeStock()" class="btn-gold text-lg px-8">נתח מניה</button>
        </div>

        <div id="loader" class="hidden flex flex-col items-center py-10">
            <div class="spinner mb-4"></div>
            <p class="text-gold animate-pulse">מנתח נתונים...</p>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card text-center">
                    <p class="text-gray-400 text-sm mb-2">ציון פונדמנטלי</p>
                    <div id="scoreDisplay" class="text-6xl font-bold text-gold">0</div>
                </div>
                <div class="card md:col-span-2">
                    <h2 id="compName" class="text-2xl font-bold mb-1">---</h2>
                    <p id="compPrice" class="text-xl text-green-500">---</p>
                </div>
            </div>
            <div class="card border-gold/30">
                <h3 class="text-gold font-bold mb-4">🤖 ניתוח AI</h3>
                <p id="aiSummary" class="text-gray-200 leading-relaxed"></p>
            </div>
        </div>
    </main>

    <script>
        function saveKeys() {
            const ant = document.getElementById('antKey').value.trim();
            const av = document.getElementById('avKey').value.trim();
            localStorage.setItem('fv_ant', ant);
            localStorage.setItem('fv_av', av);
            alert("המפתחות נשמרו בהצלחה!");
        }

        window.onload = () => {
            document.getElementById('antKey').value = localStorage.getItem('fv_ant') || "";
            document.getElementById('avKey').value = localStorage.getItem('fv_av') || "";
        };

        async function analyzeStock() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            const ant = localStorage.getItem('fv_ant');
            const av = localStorage.getItem('fv_av');

            if (!ticker || !ant || !av) {
                alert("אנא הזן סימול וודא שהמפתחות שמורים");
                return;
            }

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                // נתונים מ-Alpha Vantage
                const res = await fetch(`https://www.alphavantage.co/query?function=OVERVIEW&symbol=${ticker}&apikey=${av}`);
                const data = await res.json();

                if (data.Note) throw new Error("מגבלת API. המתן דקה.");
                if (!data.Symbol) throw new Error("מניה לא נמצאה.");

                // שליחה לקלוד
                const ai = await callClaude(data, ant);
                
                // עדכון UI
                document.getElementById('compName').innerText = data.Name;
                document.getElementById('scoreDisplay').innerText = ai.score;
                document.getElementById('aiSummary').innerText = ai.summary;
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');

            } catch (e) {
                alert("שגיאה: " + e.message);
                document.getElementById('loader').classList.add('hidden');
            }
        }

        async function callClaude(overview, key) {
            const prompt = `Analyze ${overview.Symbol}. P/E: ${overview.PERatio}. Return ONLY JSON: {"score":0-100, "summary":"Hebrew analysis"}`;
            const res = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": key,
                    "anthropic-version": "2023-06-01",
                    "anthropic-dangerous-direct-browser-access": "true"
                },
                body: JSON.stringify({
                    model: "claude-3-sonnet-20240229",
                    max_tokens: 1000,
                    messages: [{role: "user", content: prompt}]
                })
            });
            const json = await res.json();
            return JSON.parse(json.content[0].text);
        }
    </script>
</body>
</html>
